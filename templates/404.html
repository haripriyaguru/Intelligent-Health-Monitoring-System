{% extends "base.html" %}

{% block title %}Page Not Found - Health Assistant{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="error-container">
                <h1 class="display-1 text-primary fw-bold">404</h1>
                <h2 class="text-dark mb-3">Page Not Found</h2>
                <p class="text-muted fs-5 mb-4">
                    Sorry, the page you're looking for doesn't exist or has been moved.
                </p>
                
                <div class="d-flex gap-2 justify-content-center">
                    <a href="/" class="btn btn-primary btn-lg">
                        <i class="bi bi-house"></i> Go Home
                    </a>
                    <a href="javascript:history.back()" class="btn btn-outline-primary btn-lg">
                        <i class="bi bi-arrow-left"></i> Go Back
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .error-container {
        min-height: 400px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
</style>
{% endblock %}
