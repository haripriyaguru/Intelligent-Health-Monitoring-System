{% extends "base.html" %}

{% block title %}Login - Health Assistant{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-primary">
                <div class="card-body p-5">
                    <h2 class="text-center text-primary mb-4 fw-bold">Login</h2>
                    
                    {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            {{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endif %}

                    <form method="POST">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required autofocus>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label" for="remember">
                                Remember me
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Login</button>
                    </form>

                    <hr class="my-4">

                    <p class="text-center text-muted">Don't have an account?
                        <a href="{{ url_for('register') }}" class="text-primary fw-bold">Register here</a>
                    </p>
                </div>
            </div>

            <div class="alert alert-info mt-3" role="alert">
                <small><strong>Demo Credentials:</strong> Use any valid email and password combination to test the application.</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
